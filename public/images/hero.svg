<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" role="img" aria-label="Ilustración de un futbolista cantando con salpicadura de pintura roja y azul">
  <defs>
    <radialGradient id="halo" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="splashR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D8121F"/>
      <stop offset="100%" stop-color="#8F0B14"/>
    </linearGradient>
    <linearGradient id="splashB" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16264e"/>
      <stop offset="100%" stop-color="#0B1430"/>
    </linearGradient>
  </defs>
  <circle cx="320" cy="250" r="230" fill="url(#halo)"/>
  <path d="M90 430 C 60 300, 180 120, 330 110 C 470 100, 590 210, 560 360 C 540 470, 430 540, 320 530 C 210 520, 120 540, 90 430 Z" fill="url(#splashB)" opacity="0.9"/>
  <path d="M130 420 C 100 310, 200 150, 330 145 C 450 140, 550 235, 525 355 C 505 450, 415 505, 320 498 C 225 490, 155 515, 130 420 Z" fill="url(#splashR)" opacity="0.92"/>
  <path d="M60 470 l40 -14 -10 42 z M580 200 l-34 10 26 26 z M520 470 l30 -8 -8 30 z" fill="#D8121F" opacity="0.65"/>
  <!-- Singing figure silhouette -->
  <g fill="#0B1430">
    <circle cx="322" cy="212" r="52"/>
    <path d="M322 258 c -70 0 -118 52 -126 132 l 252 0 c -8 -80 -56 -132 -126 -132 z"/>
    <path d="M250 330 q -40 26 -48 78 l 44 12 q 8 -50 26 -74 z"/>
    <path d="M394 330 q 40 26 48 78 l -44 12 q -8 -50 -26 -74 z"/>
  </g>
  <!-- Jersey stripes (generic, no crest) -->
  <g>
    <path d="M282 268 l 0 118 20 0 0 -126 z" fill="#ffffff"/>
    <path d="M322 262 l 0 128 20 0 0 -128 z" fill="#D8121F"/>
    <path d="M362 268 l -8 118 20 4 8 -114 z" fill="#ffffff"/>
  </g>
  <!-- Open mouth singing hint -->
  <ellipse cx="322" cy="230" rx="12" ry="16" fill="#F4F5F8"/>
  <!-- Music notes -->
  <g fill="#101C3A" opacity="0.85">
    <path d="M470 120 q 4 -26 30 -30 l 0 44 a 12 12 0 1 1 -8 -11 l 0 -22 q -14 4 -16 22 z"/>
    <circle cx="512" cy="182" r="8"/>
    <path d="M512 182 l 0 -40 14 -4 0 40" stroke="#101C3A" stroke-width="6" fill="none"/>
    <circle cx="150" cy="180" r="7"/>
    <path d="M150 180 l 0 -34 12 -3 0 34" stroke="#101C3A" stroke-width="5" fill="none"/>
  </g>
</svg>
